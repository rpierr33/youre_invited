<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="#1B3A4B"/>
  <!-- Content centered within 80% safe zone (roughly 51px padding each side) -->
  <g transform="translate(256,256)">
    <!-- Envelope body -->
    <rect x="-120" y="-70" width="240" height="156" rx="12" fill="none" stroke="#C9A96E" stroke-width="10"/>
    <!-- Envelope flap lines -->
    <polyline points="-120,-70 0,36 120,-70" fill="none" stroke="#C9A96E" stroke-width="10" stroke-linejoin="round"/>
    <!-- Bottom fold accents -->
    <line x1="-120" y1="86" x2="-36" y2="16" stroke="#C9A96E" stroke-width="6" opacity="0.5"/>
    <line x1="120" y1="86" x2="36" y2="16" stroke="#C9A96E" stroke-width="6" opacity="0.5"/>
    <!-- Small star/sparkle -->
    <circle cx="78" cy="-104" r="7" fill="#C9A96E" opacity="0.7"/>
    <circle cx="104" cy="-96" r="4" fill="#C9A96E" opacity="0.5"/>
  </g>
</svg>
